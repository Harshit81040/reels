
<!DOCTYPE html>
<html>
<head>
<title>Reel Cutter Tool</title>
<style>
body{
background:#5c4033;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}
.box{
max-width:750px;
margin:auto;
background:#ffffff22;
padding:20px;
border-radius:15px;
}
button{
padding:10px 20px;
margin:8px;
border:none;
border-radius:8px;
cursor:pointer;
}
.part{
background:#ffffff22;
padding:10px;
margin:10px;
border-radius:10px;
}
video{
width:260px;
border-radius:12px;
margin-top:15px;
}
</style>
</head>
<body>

<div class="box">
<h1>🎬 Reel Cutter Tool</h1>

<input type="file" id="videoFile" accept="video/*">
<br><br>

<button onclick="loadVideo()">Generate Reels</button>

<p id="info"></p>

<video id="preview" controls></video>

<h2>Reels List</h2>

<div id="list"></div>

</div>

<script>
function loadVideo(){
let file = document.getElementById("videoFile").files[0];

if(!file){
alert("Please select video");
return;
}

let video = document.getElementById("preview");
video.src = URL.createObjectURL(file);

video.onloadedmetadata = function(){

let seconds = Math.floor(video.duration);
let parts = Math.floor(seconds / 30);

document.getElementById("info").innerText =
"Video Length: " + Math.floor(seconds/60) + " min " + (seconds%60) + " sec | Total Reels: " + parts;

let list = document.getElementById("list");
list.innerHTML = "";

for(let i=1;i<=parts;i++){
list.innerHTML += `
<div class="part">
Part ${i}
<button onclick="this.parentElement.remove();renumber()">Delete</button>
<button>Download</button>
<button>Edit</button>
</div>
`;
}

};
}

function renumber(){
let all = document.querySelectorAll(".part");
all.forEach((item,index)=>{
item.childNodes[0].textContent = "Part " + (index+1) + " ";
});
}
</script>

</body>
</html>
