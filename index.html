
<!DOCTYPE html>
<html>
<head>
<title>Reel Cutter Tool</title>
<style>
body{
background:#5c4033;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}
.box{
max-width:700px;
margin:auto;
background:#ffffff22;
padding:20px;
border-radius:15px;
}
button{
padding:10px 20px;
margin:8px;
border:none;
border-radius:8px;
cursor:pointer;
}
.part{
background:#ffffff22;
padding:10px;
margin:10px;
border-radius:10px;
}
</style>
</head>
<body>

<div class="box">
<h1>🎬 Reel Cutter Tool</h1>

<p>Enter video length in minutes:</p>

<input type="number" id="minutes" placeholder="20">
<br><br>

<button onclick="generateReels()">Generate Reels</button>

<h2>Reels List</h2>

<div id="list"></div>

</div>

<script>
function generateReels(){
let min = document.getElementById("minutes").value;
let totalSeconds = min * 60;
let parts = Math.floor(totalSeconds / 30);

let list = document.getElementById("list");
list.innerHTML = "";

for(let i=1;i<=parts;i++){
list.innerHTML += `
<div class="part">
Part ${i}
<button onclick="this.parentElement.remove();renumber()">Delete</button>
<button>Download</button>
<button>Edit</button>
</div>
`;
}
}

function renumber(){
let all = document.querySelectorAll(".part");
all.forEach((item,index)=>{
item.childNodes[0].textContent = "Part " + (index+1) + " ";
});
}
</script>

</body>
</html>
